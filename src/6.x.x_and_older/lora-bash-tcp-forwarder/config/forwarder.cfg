# lora-bash-tcp-forwarder — configuration
# Source this file in bash/sh: . /path/to/forwarder.cfg
# All values may be overridden by the environment before sourcing.

# UDP port to listen for incoming Semtech packet-forwarder datagrams
LISTEN_PORT=1700

# PHP server host (IP address or hostname)
PHP_HOST=192.168.1.100

# PHP server TCP port (raw TCP, not HTTP)
PHP_PORT=3001

# Full path of the log file
LOG_FILE=/var/log/lora_tcp_forwarder.log
